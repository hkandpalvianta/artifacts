name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs: 
      build_output: ${{ steps.set_output.outputs.test }}
      
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build
      - name: Set output
        id: set_output
        run: echo "test=${ 1+3 }" >> $GITHUB_OUTPUT  
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: dist
          retention-days: 1
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-prod
      - name: Deploy
        run: ls
  postdeploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "${{ needs.build.outputs.build_output }}"
